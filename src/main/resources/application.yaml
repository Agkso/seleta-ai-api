spring:
  application:
    name: seleto-ai-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/seleto_ai}
    username: ${DB_USERNAME:seleto}
    password: ${DB_PASSWORD:seleto}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

rate-limit:
  max-requests: ${RATE_LIMIT_MAX_REQUESTS:10}
  window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}

server:
  port: 8081